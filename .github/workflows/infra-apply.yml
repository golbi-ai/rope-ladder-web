name: Infra apply

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: rope-ladder-web-infra-apply
  cancel-in-progress: false

env:
  TOFU_VERSION: "1.12.1"
  WORKDIR: infra/gcp

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}
          tofu_wrapper: false
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: the-bird-499021-m8
          workload_identity_provider: projects/720168071109/locations/global/workloadIdentityPools/rope-ladder-web/providers/github-oidc
          service_account: rope-ladder-web-tofu-apply@the-bird-499021-m8.iam.gserviceaccount.com
      - working-directory: ${{ env.WORKDIR }}
        run: tofu init
      - working-directory: ${{ env.WORKDIR }}
        run: tofu plan -out=plan.tfplan
      - working-directory: ${{ env.WORKDIR }}
        run: tofu apply plan.tfplan
