name: Deploy to Cloud Run

on:
  workflow_run:
    workflows: ["Infra apply"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: rope-ladder-web-deploy
  cancel-in-progress: false

env:
  PROJECT_ID: the-bird-499021-m8
  REGION: us-central1
  SERVICE: rope-ladder-web
  IMAGE: us-central1-docker.pkg.dev/the-bird-499021-m8/rope-ladder-web/rope-ladder-web
  HEAD_SHA: ${{ github.event.workflow_run.head_sha }}

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ env.HEAD_SHA }}
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: the-bird-499021-m8
          workload_identity_provider: projects/720168071109/locations/global/workloadIdentityPools/rope-ladder-web/providers/github-oidc
          service_account: rope-ladder-web-deployer@the-bird-499021-m8.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
      - run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ env.HEAD_SHA }}
      - id: staging
        run: |
          gcloud run deploy "$SERVICE" --project "$PROJECT_ID" --region "$REGION" \
            --image "$IMAGE:$HEAD_SHA" --no-traffic --tag staging --quiet
          revision=$(gcloud run services describe "$SERVICE" --project "$PROJECT_ID" --region "$REGION" --format=json | jq -r '.status.traffic[] | select(.tag == "staging") | .revisionName')
          test -n "$revision"
          echo "revision=$revision" >> "$GITHUB_OUTPUT"
      - run: |
          url=$(gcloud run services describe "$SERVICE" --project "$PROJECT_ID" --region "$REGION" --format=json | jq -r '.status.traffic[] | select(.tag == "staging") | .url')
          test -n "$url"
          curl --fail --silent --show-error --max-time 180 --retry 5 --retry-delay 10 --retry-all-errors "$url/health"
      - run: gcloud run services update-traffic "$SERVICE" --project "$PROJECT_ID" --region "$REGION" --to-revisions "${{ steps.staging.outputs.revision }}=100" --quiet
